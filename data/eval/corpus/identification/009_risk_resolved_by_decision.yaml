description: >
  Risk resolved by meeting end: a risk is raised and substantively discussed, but the
  group immediately commits to a fix and assigns it. By end of meeting the risk is fully
  diagnosed, resolved, and actioned — so the Risk agent must stay silent. The absence of
  a no-rate-limiting Risk node is the key assertion; a Decision and an Action Item should
  be extracted instead.

transcript: |
  We have no rate limiting on the public API right now. If a client hammers it, we'll
  exhaust the database connection pool and bring down the whole service.
  That's happened in staging — a runaway integration test took down the environment for
  twenty minutes last week.
  We need to fix this before the external beta. We'll enforce a per-client rate limit of
  200 requests per minute at the API gateway level. That's the decision.
  Agreed. Lena, can you configure the rate limiting rules in the gateway by end of this sprint?
  Yes, I'll have it done by Friday.

