    - quote: "We need to fix this before the external beta. We'll enforce a per-client rate limit of\n\
        200 requests per minute at the API gateway level. That's the decision.\n\
        Agreed."
      title: Enforce 200 req/min per-client rate limit at the API gateway
      description: The team decided to enforce a per-client rate limit of 200 requests per minute at the API gateway level before the external beta.
      decision: Enforce a per-client rate limit of 200 requests per minute at the API gateway.
      rationale: No rate limiting currently risks exhausting the database connection pool under hammering, bringing down the whole service.
      alternatives_considered: []

