description: >
  Decision edge case: a settled group-level commitment can be expressed as a rejection
  or prohibition. The team rules out client-side caching for the auth token endpoint
  because stale tokens create a security exposure. This should be a Decision, not just
  a statement of preference.

tags:
  tier: happy-path
  difficulty: medium
  focus: [decision]

transcript: |
  Should we allow client-side caching on the auth token endpoint to reduce load?
  No. Caching auth tokens client-side means revoked tokens stay valid until the cache expires.
  That is a security exposure we cannot accept. No client-side caching on that endpoint, ever.
  Agreed. No client-side caching on that endpoint.

