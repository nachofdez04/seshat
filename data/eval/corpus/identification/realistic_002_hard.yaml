        becomes completely unusable.\n\
        Exactly. And we've had two incidents already this sprint where the aggregation job ran\n\
        long and blocked the dashboard API for fifteen minutes.\n\
        So we need to understand the full scope before we can fix it. Do we know which partitions\n\
        are missing the index?\n\
        Not yet — I'd need to run a scan across all partitions to map the gaps.\n\
        Lena, can you run that scan and put together a remediation plan by Thursday?\n\
        Sure, I'll take that.\n\
        Great. That said, the underlying risk is still open — we don't know the full extent of\n\
        the missing indexes yet and more incidents are possible before the fix lands.\n\
        Agreed, the investigation doesn't close the risk."
      title: Missing composite indexes may cause further reporting dashboard outages before remediation
      description: The composite index backfill on the events table is incomplete across historical partitions; the full scope is unknown and further incidents blocking the reporting dashboard are possible before the fix is applied.
      type: future
      risk: Unindexed historical partitions on the events table continue to cause aggregation query timeouts that block tenant reporting dashboards; additional incidents are likely before the index gap is fully mapped and remediated.

  action_item:
    - quote: "Lena, can you run that scan and put together a remediation plan by Thursday?\n\
        Sure, I'll take that."
      title: Scan partitions for missing indexes and draft remediation plan
      description: Lena will scan all events table partitions to identify missing composite index coverage and produce a remediation plan by Thursday.
      task: Run a scan across all events table partitions to map missing composite indexes and prepare a remediation plan.
      assignee: Lena
      due: by Thursday

    - quote: "Who's setting the config flag? Dmitri, you own the feature flag service.\n\
        Yeah, I'll update the flag config and the worker cap setting. Just confirm the date —\n\
        end of month means the 31st?\n\
        Correct, the 31st.\n\
        I'll have it done by then."
      title: Update feature flag config and worker cap for document export
      description: Dmitri will update the feature flag configuration to enable document export for Pro and Enterprise customers and set the per-export worker cap to 200 MB by the 31st.
      task: Update the feature flag config to enable document export for Pro and Enterprise customers and set the per-export size cap to 200 MB.
      assignee: Dmitri
      due: by the 31st

  open_question:
    - quote: "We still haven't confirmed whether the export job logs need to be included in the\n\
        customer-facing audit trail. Legal hasn't reviewed that yet and we don't have a clear\n\
        answer. That needs resolving before we can say the feature is fully compliant.\n\
        Agreed, that's still open. Let's flag it and move on."
      title: Must export job logs be included in the customer-facing audit trail?
      description: Legal has not yet reviewed whether export job logs are required in the customer-facing audit trail; without this answer the document export feature cannot be declared fully compliant.
      question: Are export job logs required to be included in the customer-facing audit trail for compliance purposes?
      context: Legal review has not been completed; the feature cannot be considered fully compliant until this is resolved.
