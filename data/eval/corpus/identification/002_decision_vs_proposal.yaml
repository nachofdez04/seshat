description: >
  Decision edge case: a proposal that is still under discussion must not be extracted
  as a Decision. Only the final settled outcome qualifies. The opening question, the
  preference ("I'd lean towards Kafka"), and the exploratory mention ("We could also
  consider RabbitMQ") are all mid-discussion noise — none should appear as a Decision.

transcript: |
  Should we use Kafka or RabbitMQ for the event bus?
  I'd lean towards Kafka — better throughput and native log compaction.
  We could also consider RabbitMQ if we want simpler ops.
  We don't have the ops capacity for Kafka right now. Let's go with RabbitMQ for this release
  and revisit when we have a platform team.
  Agreed.

