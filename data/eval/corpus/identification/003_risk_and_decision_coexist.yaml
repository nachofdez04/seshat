description: >
  A risk and a decision appear in the same exchange. The concern is raised, then
  immediately resolved by a committed course of action. Both nodes should be extracted:
  the risk (because the group substantively discussed the failure mode before committing)
  and the decision. The risk is NOT suppressed by the decision being present.

transcript: |
  We're deploying the new schema directly to production without a shadow migration first.
  If the rollback script has a bug, we could corrupt data in the orders table.
  That's happened before — we lost three hours of orders in Q3.
  Agreed, that's unacceptable. We will run a full dry-run in staging with a synthetic orders
  snapshot before any production deploy. No exceptions.
  And we should add a checksum validation step to the rollback script — Tariq, can you own that?
  Yes, I'll add it before Thursday's deploy window.

