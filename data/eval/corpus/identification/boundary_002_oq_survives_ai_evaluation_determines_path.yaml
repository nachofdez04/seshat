        Legal hasn't given us a requirement yet — they said they'd have guidance by end of month.\n\
        We can't close this without legal input. Let's mark it as open for now."
      title: What retention period applies to user event data?
      description: The team cannot set the user event retention policy without legal guidance, which is expected by end of month.
      question: What data retention period applies to user events?
      context: Legal guidance is pending and expected by end of month; the team cannot decide independently.

  action_item:
