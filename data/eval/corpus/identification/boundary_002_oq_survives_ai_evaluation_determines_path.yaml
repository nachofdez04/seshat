description: >
  Open Question extraction: the group raises a question, explicitly defers it,
  and also assigns someone to investigate. Both the Open Question and the Action Item
  should be extracted. The Action Item does not close the Open Question.

tags:
  tier: boundary
  difficulty: hard
  focus: [open_question, action_item]
  detail: "OQ survives when evaluation determines path"

transcript: |
  We need to decide on the data retention policy for user events. Options are 30, 90, or 365 days.
  Legal hasn't given us a requirement yet — they said they'd have guidance by end of month.
  We can't close this without legal input. Let's mark it as open for now.
  Makes sense. Priya, can you chase legal and get us a written requirement by next sprint planning?
  Sure, I'll follow up with them this week.

