        Sure, I'll follow up with them this week."
      title: Obtain legal data retention requirement
      description: Priya will follow up with legal to get a written retention requirement before next sprint planning.
      task: Chase legal for a written data retention requirement.
      assignee: Priya
      due: by next sprint planning

