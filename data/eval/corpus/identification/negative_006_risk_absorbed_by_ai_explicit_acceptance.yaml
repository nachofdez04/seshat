  names a failure mode and is immediately asked to own the investigation and fix. The correct
  extraction is an ACTION_ITEM only — the concern was fully absorbed into an assigned commitment
  in the same exchange. The speaker is identified by name so the assignee is resolvable.
  Models that over-extract will produce a spurious RISK.

