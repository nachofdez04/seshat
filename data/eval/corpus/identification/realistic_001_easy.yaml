description: >
  Realistic easy: a clean engineering planning meeting for a new notification service.
  Covers all four types with formal, unambiguous language and a linear narrative.
  Two decisions (one with rationale and alternatives, one without), one future risk
  and one blocker risk, two action items (one with due date, one without), and two
  open questions. Tests breadth of extraction with zero noise.

tags:
  tier: realistic
  difficulty: easy
  focus: [decision, risk, action_item, open_question]
  detail: "clean multi-topic meeting; all 4 types; linear narrative"

transcript: |
  Alright, let's get started. We're here to plan the notification service — delivery
  channel, template storage, and open items before we kick off development next week.
  First item: how should we deliver push notifications? The candidates are FCM directly
  from our backend, or routing everything through a managed service like AWS SNS.
  I'd prefer SNS. It handles device registration, platform routing, and retry logic for
  us. Building all of that on FCM directly would take weeks and give us less reliability.
  Agreed. We also get a single API regardless of whether we expand to APNs later. FCM
  direct would mean maintaining separate code paths per platform.
  Good points. Let's decide: we will use AWS SNS as the push notification delivery layer.
  Agreed.
  Next: template storage. We need somewhere to keep the notification templates. Options
  we considered last week were a dedicated templates table in the main Postgres database,
  or a separate key-value store in DynamoDB.
  Let's put them in Postgres. We already have migrations tooling, access controls, and
  the rest of the content model there. No need to introduce another data store.
  Agreed. Templates go in Postgres.
  Now let me flag two risk items before we move on.
  The first one is about the notification volume ceiling. SNS has a default regional
  limit of 100 publish calls per second. We project peak traffic at 80 per second today,
  but if we double users by Q3 we will breach that limit and start dropping notifications.
  That's a future risk we should track. We should request a limit increase well before Q3.
  Agreed, it's on the horizon but not immediate.
  The second risk is more urgent. The SNS topic ARNs and IAM role assignments have to
  be created by the platform team before we can write any integration tests. Platform
  said they won't have capacity until next week, and our integration test milestone is
  this Thursday. We are blocked right now.
  That's a blocker. We cannot proceed with integration testing until those resources exist.
  Correct. Nothing to test against.
  Okay. Action items. Yusuf, can you open the limit increase ticket with AWS Support by
  end of day today?
  Done by EOD, no problem.
  Good. We also need someone to write the initial template schema migration — Fatima, can
  you draft that and post it for review?
  Sure, I'll put it together. No hard deadline on this one yet?
  Not yet — just get a draft up for the team to review before we finalise the schema.
  Fine, I'll post it in the pull request channel when it's ready.
  Two open items before we close. We haven't settled the retry strategy for failed
  deliveries. If a notification fails, do we retry immediately, use exponential backoff,
  or rely on SNS dead-letter queues? We need a recommendation before implementation starts.
  Agreed, that's still open.
  And we haven't decided how notification preferences will be stored per user — in the
  user profile service, or as a separate preferences microservice. Architecture decision,
  not urgent, but we need it before we wire up the opt-out flow.
  Let's leave both of those as open questions for now.

