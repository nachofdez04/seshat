transcript: |
  The import path still worries me. If search indexing falls behind during the tenant import,
  customers could see stale search results for newly migrated records.
  Noted. Quick status first: let's do that after the updates.
  Quick status: API changes are merged and the importer dry-run finished last night.
  Back to the indexing concern: the importer can enqueue a million record updates in one burst.
  If indexing lags behind that burst, customers may see stale search results for several hours
  after migration, and support will not be able to tell whether records are missing or just delayed.
  That's a real launch risk. We do not have those capacity numbers yet.

