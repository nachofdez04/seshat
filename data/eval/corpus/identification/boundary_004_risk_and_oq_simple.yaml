description: >
  Simple mixed coverage: one concrete future Risk and one unrelated Open Question
  appear in the same short transcript. The risk has a stated failure mode and group
  acknowledgement; the open question is a deferred product choice.

tags:
  tier: boundary
  difficulty: medium
  focus: [risk, open_question]
  detail: "risk and unrelated OQ coexist"

transcript: |
  The nightly export job still runs on the primary database.
  If the export overlaps with peak traffic, it could saturate read connections and slow down checkout.
  That's a real risk for launch week; we do not have isolation in place yet.
  Separately, do we show the new billing banner to all admins or only account owners?
  Product has not decided the audience yet, so it is not settled.

