description: >
  Decision edge case: the team commits to a material future process rather than choosing
  between product options. This is a Decision because the benchmark gate becomes required
  for future production storage changes; it is not an Action Item because no owner is
  assigned.

tags:
  tier: boundary
  difficulty: medium
  focus: [decision]
  detail: "process commitment as decision, no action item"

transcript: |
  We keep approving storage changes based on informal estimates.
  Let's make the process explicit: every production storage change must complete a two-day benchmark before approval.
  The benchmark result has to be attached to the architecture review.
  Agreed, no storage change goes to production review without that benchmark evidence.

