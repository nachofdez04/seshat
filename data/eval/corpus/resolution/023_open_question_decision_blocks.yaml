corpus_id: 023_open_question_decision_blocks
description: >
  Cross-type open_question→decision baseline: an unanswered question blocks a decision
  from being finalised — the question must be resolved first. Single obvious blocks
  relationship.

source_nodes:
  - id: question_ownership
    type: open_question
    title: Which team owns the shared notification service going forward?
    description: It is unclear whether the platform team or the product team owns the shared notification service. Until ownership is settled, neither team will commit to the SLA or roadmap required before the service can be adopted as a dependency.
    quote: "Nobody knows who owns the notification service — platform says it's product, product says it's platform."

kb_nodes:
  - id: decision_adopt_notifications
    type: decision
    title: Adopt the shared notification service as the standard for all customer-facing alerts
    description: Pending decision to designate the shared notification service as the single channel for all customer-facing alerts, replacing per-service email integrations. Cannot be finalised without a committed owner.
    quote: "We want to standardise on the notification service for all customer alerts — but we can't commit until we know who owns it."

expected_relations:
  - source: question_ownership
    target: decision_adopt_notifications
    rel_type: blocks
