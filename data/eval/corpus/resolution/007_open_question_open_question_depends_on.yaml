corpus_id: 007_open_question_open_question_depends_on
description: >
  Same-type open_question↔open_question discriminating: one question cannot be answered
  until another is resolved first (depends_on). An unrelated question is included as a
  source-side distractor. The evaluated assertion is the single source→target
  depends_on relation plus no extra links from the unrelated source question.

source_nodes:
  - id: question_hosting
    type: open_question
    title: Which cloud region should we deploy the new service to?
    description: The team cannot choose a cloud region until the data residency requirements are confirmed, because the answer directly constrains the available options.
    quote: "We can't pick a region until we know what the data residency rules say."

  - id: question_unrelated
    type: open_question
    title: Should the API use versioned URLs or Accept-header versioning?
    description: Unresolved API versioning strategy question, independent of the deployment and compliance questions.
    quote: "We still haven't settled on URL versioning versus Accept-header versioning for the API."

kb_nodes:
  - id: question_residency
    type: open_question
    title: What are the data residency requirements for the new service?
    description: Open question about whether regulatory or contractual rules require data to stay within a specific jurisdiction.
    quote: "Do we have any data residency constraints? Legal hasn't confirmed yet."

expected_relations:
  - source: question_hosting
    target: question_residency
    rel_type: depends_on
