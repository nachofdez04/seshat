corpus_id: 020_risk_open_question_no_relation
description: >
  Cross-type risk→open_question discriminating: a risk and an open question from the
  same project where the risk does not block the question. The risk concerns a
  security vulnerability in a dependency; the question concerns UX copy — same product,
  no causal link.

source_nodes:
  - id: risk_dependency_vuln
    type: risk
    title: Outdated image processing library contains a known RCE vulnerability
    description: The image processing library in use has a known remote code execution vulnerability in versions below 3.2.1. The project is currently on 3.0.4 and has not been patched.
    quote: "The image library we use has a known RCE in anything below 3.2.1 — we're on 3.0.4 and haven't patched yet."

kb_nodes:
  - id: question_copy
    type: open_question
    title: Should the empty-state copy say 'No results' or 'Nothing here yet'?
    description: The UX team flagged that the empty-state message across the app is inconsistent. A decision on the preferred phrasing is needed before the next design system update.
    quote: "The empty-state copy is inconsistent — do we want 'No results' or 'Nothing here yet'?"

expected_relations: []
