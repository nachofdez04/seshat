    type: action_item
    title: Renew the TLS certificate for the payments subdomain before expiry
    description: The TLS certificate for the payments subdomain expires in 14 days. It must be renewed before expiry to avoid a service disruption.
    quote: "The payments subdomain TLS cert expires in two weeks — renew it before it lapses."

