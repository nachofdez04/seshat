corpus_id: 026_open_question_action_item_no_relation
description: >
  Cross-type open_question→action_item discriminating: an open question and an action
  item from the same project where the question does not block the action. The question
  concerns a future architectural topic; the action item is an immediate operational
  task that is fully independent.

source_nodes:
  - id: question_event_sourcing
    type: open_question
    title: Should the order service be refactored to use event sourcing?
    description: The architecture guild is debating whether to refactor the order service to use event sourcing. No decision has been reached and the question remains open for the next design review.
    quote: "Should we refactor orders to event sourcing? Still open — we'll discuss it at the next design review."

kb_nodes:
