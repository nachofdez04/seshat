    title: Should the retry backoff cap be 30 s or 60 s for the payment service specifically?
    description: After agreeing to add retry backoff, the team realised the cap value needs a decision specifically for the payment service, where latency SLAs are tighter.
    quote: "For the payment service specifically — should the backoff cap be 30 seconds or 60? The SLA is tighter there."

