corpus_id: 017_risk_decision_blocks
description: >
  Cross-type risk→decision baseline: an unresolved risk explicitly blocks a pending
  decision from being finalised. Single obvious blocks relationship.

source_nodes:
  - id: risk_compliance
    type: risk
    title: GDPR compliance review for the new data pipeline is not complete
    description: The legal team has not yet confirmed that the new data pipeline meets GDPR requirements. Until the review is complete, any architecture decision that commits data flows cannot be finalised.
    quote: "Legal hasn't signed off on the pipeline for GDPR yet — we can't lock in the architecture until they do."

kb_nodes:
  - id: decision_pipeline_arch
    type: decision
    title: Finalise the data pipeline architecture for EU customers
    description: Pending decision on whether to use a single-region pipeline or a multi-region active-active topology for EU customer data, pending GDPR review outcome.
    quote: "We need to decide between single-region and multi-region for EU — but that's blocked on the GDPR review."

expected_relations:
  - source: risk_compliance
    target: decision_pipeline_arch
    rel_type: blocks
