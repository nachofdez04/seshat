  action item from starting — the action requires the answer before work can begin.
  Single obvious blocks relationship.

tags:
  tier: simple
  pairing: cross_type
  types: [action_item, open_question]
  relations: [blocks]
  difficulty: easy

source_nodes:
  - id: question_budget
    type: open_question
    title: What is the approved budget for the observability tooling upgrade?
    description: Finance has not yet confirmed the budget allocation for the observability tooling upgrade. The procurement action item cannot proceed until the approved spend limit is known.
    quote: "Finance hasn't confirmed the budget for the observability upgrade — we're waiting on the number."

kb_nodes:
  - id: action_procure
    type: action_item
    title: Procure and set up Datadog for the platform engineering team
    description: The platform team has been asked to procure and set up Datadog for platform-wide observability. The procurement cannot start until the budget figure is approved by finance.
    quote: "Once we have the budget confirmed, procure and set up Datadog for the platform team."

expected_relations:
  - source: question_budget
    target: action_procure
    rel_type: blocks
