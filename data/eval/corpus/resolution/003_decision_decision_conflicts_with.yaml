source_nodes:
  - id: decision_centralise
    type: decision
    title: Centralise all logging through the platform logging service
    description: The infrastructure team decided all services must route logs through the central platform logging service, prohibiting direct writes to CloudWatch.
    quote: "All services must route logs through the platform logging service â€” no direct CloudWatch writes."

  - id: decision_unrelated
    type: decision
    title: Adopt conventional commits for all repositories
    description: The team agreed to enforce conventional commit format across all repositories starting next sprint.
    quote: "From next sprint, all commits must follow the conventional commit format."

kb_nodes:
  - id: decision_direct
    type: decision
    title: Services may write logs directly to CloudWatch
    description: An earlier decision permitted services to write logs directly to CloudWatch without routing through any intermediary.
    quote: "Services can write logs directly to CloudWatch â€” keep it simple."

expected_relations:
  - source: decision_centralise
    target: decision_direct
    rel_type: conflicts_with
