corpus_id: null_011_action_item_risk_unrelated
description: >
  Cross-type action_item→risk discriminating: an action item and a risk from the same
  project where completing the action does not mitigate the risk. The action concerns
  improving test coverage; the risk concerns a third-party supplier going out of
  business — same project, no causal link.

tags:
  tier: "null"
  pairing: cross_type
  types: [action_item, risk]
  relations: []
  difficulty: easy

source_nodes:
  - id: action_test_coverage
    type: action_item
    title: Increase unit test coverage of the billing module to 80%
    description: The billing module currently has 42% unit test coverage. The team agreed to raise it to 80% before the next release to reduce regression risk in payment-critical code paths.
    quote: "Get the billing module test coverage up to 80% before the next release — it's at 42% right now."

kb_nodes:
  - id: risk_supplier
    type: risk
    title: Primary SMS gateway supplier may exit the market following acquisition
    description: The primary SMS gateway supplier has been acquired and may be wound down within 12 months. If the service is discontinued, the platform will lose its SMS notification capability with little notice.
    quote: "Our SMS supplier was just acquired — there's a real chance they get wound down. We'd lose SMS notifications with barely any warning."

