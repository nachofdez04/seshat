corpus_id: simple_016_rotate_api_keys
description: >
  Cross-type action_item→risk baseline: completing the action item directly addresses
  and mitigates a stated risk. Single obvious mitigates relationship.

tags:
  tier: simple
  pairing: cross_type
  types: [action_item, risk]
  relations: [mitigates]
  difficulty: easy

source_nodes:
  - id: action_rotate_keys
    type: action_item
    title: Rotate all API keys exposed in the public repository and revoke the originals
    description: A security scan found that several API keys were accidentally committed to the public repository. All exposed keys must be rotated and the originals revoked immediately to close the exposure window.
    quote: "Rotate all the API keys that were committed to the public repo and revoke the originals — do it today."

kb_nodes:
  - id: risk_exposed_keys
    type: risk
    title: API keys committed to public repository are exploitable by external actors
    description: Several API keys were found in the git history of the public repository. Until they are rotated and revoked, any external actor can use them to access internal services.
    quote: "Those API keys are in the public repo history — anyone can use them until we rotate and revoke."

expected_relations:
  - source: action_rotate_keys
    target: risk_exposed_keys
    rel_type: mitigates
