corpus_id: action-item-hire-designer-no-relation-to-engineering-tasks
description: >
  Discriminating (no-relation, same type): a hiring action item for a designer is
  thematically adjacent to other action items in the KB (all from the same Q3 planning
  meeting), but none of the engineering tasks have a direct semantic link. The scorer
  treats empty expected_relevant_ids as a negative case: recall@5 = 1.0 if nothing is
  retrieved, 0.0 if any candidate is returned.

query_node:
  id: hire-ux-designer
  type: action_item
  title: "Hire a senior UX designer before end of Q3"
  description: "The product team lacks dedicated design resource; a senior UX designer must be recruited and onboarded by end of Q3 to support the new customer-facing feature set."
  quote: "we need a senior UX designer on board by end of Q3, start the process this week"

candidate_nodes:
