description: >
  Risk deduplication and Open Question: the same indexing-lag failure mode is mentioned
  twice — the Risk agent should emit one Risk using the most complete supporting exchange.
  The group states the capacity numbers are unknown and that a decision depends on them,
  leaving the indexing strategy unresolved — a genuine Open Question alongside the Risk.

tags:
  tier: boundary
  difficulty: hard
  focus: [risk, open_question]
  detail: "same failure mode mentioned twice, single risk extracted"

transcript: |
  The import path still worries me. If search indexing falls behind during the tenant import,
  customers could see stale search results for newly migrated records.
  Noted. Quick status first: let's do that after the updates.
  Quick status: API changes are merged and the importer dry-run finished last night.
  Back to the indexing concern: the importer can enqueue a million record updates in one burst.
  If indexing lags behind that burst, customers may see stale search results for several hours
  after migration, and support will not be able to tell whether records are missing or just delayed.
  That's a real launch risk. We do not have those capacity numbers yet, and we need them to make an
  informed decision.

