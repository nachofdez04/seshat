transcript: |
  We are logging customer email addresses in the analytics event payload.
  If those logs are retained in the US region, we may violate the EU data processing agreement.
  That is more than a policy question; it could create a compliance incident if we ship beta with the current logging.
  Agreed. That is a real compliance exposure.
  So what do we do — do we strip the email from the payload, mask it, or move the logs to an EU region?
  Let's wait until we have a compliance ruling. Maybe Legal can provide guidance.

