        Agreed. It's a standing requirement from v2.5 onward."
      title: Require full smoke test and documented rollback plan before every production deploy from v2.5
      description: The team agreed that from v2.5 onward every production deploy must pass a full staging smoke test suite and include a documented rollback plan before the deploy window opens.
      decision: From v2.5 onward, every production deploy must pass a full smoke test suite in staging and have a documented rollback plan before the deploy window opens.
      rationale: Two rollbacks this quarter could have been prevented if this gate had been in place.
