# Raw ElevenLabs dialogue for the built-in sample script in scripts/generate_synthetic_audio.py,
# before background noise is mixed in. The reference is exact by construction: it is the spoken
# text of that script, with speaker labels stripped (they are never uttered).
audio_file: data/fixtures/audio/new_service_2026_05_13_dialogue.mp3

reference: |
  We need to pick a database for the new service. Options are Postgres or MySQL.
  Postgres has native JSONB and better full-text search. I'd go with it.
  Agreed. I'd go with Postgres too. It also has a more active community.
  It's settled then. Anika, can you set up the schema migrations by end of week?
  Sure, I'll have it done by Friday.
  We also need to decide on the caching layer — Redis or Memcached?
  We don't have the load numbers yet. I'd defer that decision. There's also a risk with the
  migration timeline; if staging is still down on Thursday we can't validate before Friday's
  deadline.
  That's a real concern. I haven't got a fixed date from the infra team yet. I'll ping them again.

# Tag values are quoted strings so `--tag background_noise=true` matches: the CLI can only
# produce strings, and the tag filter compares by equality without coercion.
tags:
  language: en
  background_noise: "false"
  synthetic: "true"
  speakers: "4"
