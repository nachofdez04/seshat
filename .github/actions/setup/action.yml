name: Setup Python environment
description: Checkout, install uv, and sync dependencies

inputs:
  dependency-groups:
    description: "Comma-separated dependency groups to install (e.g. 'lint,test'). Omit for all."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          uv.lock
          pyproject.toml

    - name: Install Python
      shell: bash
      run: uv python install

    - name: Install dependencies
      shell: bash
      run: |
        if [ -n "${{ inputs.dependency-groups }}" ]; then
          groups=$(echo "${{ inputs.dependency-groups }}" | tr ',' '\n' | sed 's/^/--group /' | tr '\n' ' ')
          uv sync --locked $groups
        else
          uv sync --locked
        fi
