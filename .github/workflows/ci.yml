name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          dependency-groups: lint

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Type check
        run: uv run mypy src/

  unit-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          dependency-groups: test

      - name: Run unit tests
        run: PYTEST_ADDOPTS="" uv run pytest -m "not integration and not eval" --tb=short

  integration-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          dependency-groups: test

      - name: Set up env
        run: |
          cp .env.example .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Start Docker services
        run: docker compose up -d --wait

      - name: Run integration tests
        run: uv run pytest -m "not llm and not eval" --tb=short --cov-report=xml --cov-branch --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

      - name: Stop Docker services
        run: docker compose down

  code-quality:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          dependency-groups: complexity

      - name: Run code quality metrics
        id: metrics
        run: |
          {
            echo 'REPORT<<EOF'
            echo "### Cyclomatic Complexity (C or worse)"
            echo '```'
            uv run radon cc src/ -s -a --min C
            echo '```'
            echo ""
            echo "### Maintainability Index (B or worse)"
            echo '```'
            uv run radon mi src/ --min B
            echo '```'
            echo "_Empty output above = all files pass the threshold._"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- code-quality-metrics -->';
            const body = `${marker}\n## Code Quality Metrics\n\n${process.env.REPORT}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          REPORT: ${{ steps.metrics.outputs.REPORT }}
