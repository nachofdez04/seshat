name: seshat

# Dummy AWS credentials shared by any service that talks to LocalStack.
x-aws-localstack-env: &aws-localstack-env
  AWS_ACCESS_KEY_ID: dummy_id
  AWS_SECRET_ACCESS_KEY: dummy_secret
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "mlflow:5000,localhost:${MLFLOW_PORT},127.0.0.1:${MLFLOW_PORT}"
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  localstack:
    image: localstack/localstack:3
    env_file: .env.docker
    environment:
      <<: *aws-localstack-env
      SERVICES: secretsmanager,s3
      # Passed to localstack-init.sh to seed Secrets Manager and create the S3 bucket
      DATABASE_URL: ${DATABASE_URL}
      S3_BUCKET: ${S3_BUCKET}
    ports:
      - "${LOCALSTACK_PORT}:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  seshat-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    env_file: .env.docker
    environment:
      <<: *aws-localstack-env
      # Secrets backend — pull from LocalStack at startup
      SECRETS__PROVIDER: aws
      SECRETS__ENDPOINT_URL: http://localstack:4566
      SECRETS__REGION: ${AWS_DEFAULT_REGION}
      # Blob store
      BLOB_STORE__BUCKET: ${S3_BUCKET}
      BLOB_STORE__REGION: ${AWS_DEFAULT_REGION}
      BLOB_STORE__ENDPOINT_URL: http://localstack:4566
      # Observability
      OBSERVABILITY__MLFLOW_TRACKING_URI: http://mlflow:5000
      # API start-up flags
      API__SKIP_EXTERNAL_PROVIDER_PING: "true"
      API__SKIP_EVAL_GATE: "true"
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  seshat-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    env_file: .env.docker
    environment:
      SESHAT_API_BASE: http://seshat-api:8000
      MLFLOW_UI_URL: http://localhost:${MLFLOW_PORT}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      seshat-api:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
  mlflow_data:
